<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibroDare</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0e0c;
  --paper: #f7f3ec;
  --cream: #eee9de;
  --card: #faf8f4;
  --border: #ddd8ce;
  --muted: #8c8278;
  --accent: #c0392b;
  --accent-soft: #fdf0ee;
  --green: #1e7a4a;
  --green-soft: #eaf4ee;
  --gold: #9a6f00;
  --gold-soft: #fef9ec;
  --blue: #1a56a0;
  --blue-soft: #eef4fd;
  --shadow-sm: 0 1px 4px rgba(15,14,12,0.07);
  --shadow: 0 3px 16px rgba(15,14,12,0.10);
  --shadow-lg: 0 8px 40px rgba(15,14,12,0.16);
  --radius: 14px;
  --radius-sm: 9px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  font-size:15px;
}
/* ── LAYOUT ── */
.wrap{max-width:860px;margin:0 auto;padding:0 16px;}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(247,243,236,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1.5px solid var(--border);
  padding:12px 0;
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{
  width:36px;height:36px;background:var(--ink);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.logo-text h1{font-family:'Fraunces',serif;font-size:1.25rem;color:var(--ink);letter-spacing:-0.3px;}
.logo-text span{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-top:-2px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.badge{padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;}
.badge-admin{background:var(--ink);color:var(--paper);}
.badge-view{background:var(--green);color:#fff;}
.notif-btn{
  position:relative;width:36px;height:36px;border-radius:9px;
  border:1.5px solid var(--border);background:var(--card);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .15s;
}
.notif-btn:hover{background:var(--cream);}
.notif-badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--accent);color:#fff;
  width:16px;height:16px;border-radius:50%;
  font-size:0.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--paper);
}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:var(--radius-sm);border:none;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:0.88rem;font-weight:600;transition:all .16s;
  white-space:nowrap;
}
.btn-primary{background:var(--ink);color:var(--paper);}
.btn-primary:hover{background:#2a2520;transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.btn-danger{background:var(--accent);color:#fff;}
.btn-danger:hover{background:#a93226;}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{background:#165a37;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ink);}
.btn-outline:hover{background:var(--cream);}
.btn-ghost{background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.83rem;cursor:pointer;padding:4px 8px;}
.btn-ghost:hover{color:var(--ink);}
.btn-sm{padding:6px 13px;font-size:0.8rem;border-radius:7px;}
.btn-xs{padding:4px 10px;font-size:0.75rem;border-radius:6px;}

/* ── SETUP SCREEN ── */
.setup-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;padding:24px;gap:0;
}
.setup-card{
  background:var(--card);border-radius:20px;padding:36px 32px;
  max-width:400px;width:100%;box-shadow:var(--shadow-lg);
  border:1.5px solid var(--border);
}
.setup-card .big-icon{font-size:2.5rem;margin-bottom:12px;}
.setup-card h2{font-family:'Fraunces',serif;font-size:1.6rem;margin-bottom:6px;}
.setup-card p{font-size:0.87rem;color:var(--muted);line-height:1.6;margin-bottom:24px;}

/* ── PIN ── */
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
.pin-dot.filled{background:var(--ink);border-color:var(--ink);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.pin-key{
  background:var(--cream);border:1.5px solid var(--border);border-radius:10px;
  padding:13px;font-size:1.15rem;font-weight:600;cursor:pointer;
  font-family:'Fraunces',serif;transition:all .12s;
}
.pin-key:hover{background:var(--border);}
.pin-key:active{transform:scale(0.94);}
.pin-key.del{font-size:.9rem;color:var(--accent);}
.pin-error{color:var(--accent);font-size:0.83rem;margin-top:10px;min-height:18px;text-align:center;}

/* ── FORM ── */
.form-group{margin-bottom:13px;}
.form-group label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:10px 13px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;
  font-size:0.9rem;background:var(--paper);color:var(--ink);outline:none;transition:border-color .15s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--ink);}
.form-group textarea{resize:vertical;min-height:72px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(15,14,12,0.5);
  display:flex;align-items:center;justify-content:center;
  z-index:200;padding:16px;backdrop-filter:blur(4px);
  animation:fadeIn .18s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--card);border-radius:18px;padding:26px;
  width:100%;max-width:460px;max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:slideUp .2s ease;
}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-family:'Fraunces',serif;font-size:1.3rem;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.modal-actions{display:flex;gap:9px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap;}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:20px 0;}
.stat{
  background:var(--card);border-radius:var(--radius);
  padding:15px 17px;border:1.5px solid var(--border);
}
.stat .lbl{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.stat .val{font-family:'Fraunces',serif;font-size:1.45rem;}
.val-red{color:var(--accent);}
.val-green{color:var(--green);}
.val-gold{color:var(--gold);}

/* ── SEARCH ── */
.dash-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.dash-head h2{font-family:'Fraunces',serif;font-size:1.5rem;}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px;}
.search-wrap input{
  width:100%;padding:9px 13px 9px 34px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:0.88rem;
  background:var(--card);outline:none;transition:border-color .15s;
}
.search-wrap input:focus{border-color:var(--ink);}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:14px;}

/* ── CLIENT LIST ── */
.client-list{display:grid;gap:10px;}
.client-row{
  background:var(--card);border-radius:var(--radius);
  border:1.5px solid var(--border);padding:15px 18px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .17s;
}
.client-row:hover{border-color:var(--ink);box-shadow:var(--shadow);transform:translateY(-1px);}
.avatar{
  width:42px;height:42px;border-radius:50%;
  background:var(--ink);color:var(--paper);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:1.15rem;flex-shrink:0;
}
.client-info{flex:1;min-width:0;}
.client-name{font-weight:600;font-size:.97rem;}
.client-meta{font-size:0.77rem;color:var(--muted);margin-top:2px;}
.client-bal{text-align:right;flex-shrink:0;}
.bal-amt{font-family:'Fraunces',serif;font-size:1.1rem;}
.bal-lbl{font-size:0.68rem;text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
.bal-pos .bal-amt,.bal-pos .bal-lbl{color:var(--accent);}
.bal-neg .bal-amt,.bal-neg .bal-lbl{color:var(--green);}
.bal-zero .bal-amt,.bal-zero .bal-lbl{color:var(--muted);}

/* ── CLIENT DETAIL ── */
.back-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.back-btn{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:.87rem;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;}
.back-btn:hover{color:var(--ink);}
.client-hero{
  background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);
  padding:18px 22px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
}
.hero-left{display:flex;align-items:center;gap:14px;}
.avatar-lg{
  width:52px;height:52px;border-radius:50%;
  background:var(--ink);color:var(--paper);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:1.5rem;flex-shrink:0;
}
.hero-name{font-family:'Fraunces',serif;font-size:1.4rem;}
.hero-sub{font-size:.83rem;color:var(--muted);margin-top:2px;}
.saldo-block{text-align:right;}
.saldo-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.saldo-val{font-family:'Fraunces',serif;font-size:1.9rem;}

.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}

/* ── SHARE BOX ── */
.share-box{
  background:var(--blue-soft);border:1.5px solid #c5d8f5;
  border-radius:var(--radius-sm);padding:11px 15px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;margin-bottom:14px;
}
.share-box p{font-size:.82rem;color:var(--blue);font-weight:500;}
.share-link{font-size:.74rem;color:var(--muted);word-break:break-all;margin-top:2px;}

/* ── MOVIMENTI ── */
.mov-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mov-head h3{font-family:'Fraunces',serif;font-size:1.05rem;}
.mov-list{display:grid;gap:8px;}
.mov-item{
  background:var(--card);border-radius:var(--radius-sm);
  border:1.5px solid var(--border);padding:11px 15px;
  display:flex;align-items:center;gap:11px;
}
.mov-ico{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;flex-shrink:0;
}
.ico-acq{background:var(--accent-soft);}
.ico-acc{background:var(--green-soft);}
.ico-pag{background:var(--green-soft);}
.ico-mer{background:var(--accent-soft);}
.mov-body{flex:1;min-width:0;}
.mov-desc{font-size:.88rem;font-weight:500;}
.mov-meta{font-size:.74rem;color:var(--muted);margin-top:2px;}
.mov-note{font-size:.73rem;color:var(--muted);font-style:italic;margin-top:1px;}
.mov-right{text-align:right;flex-shrink:0;}
.mov-amt{font-family:'Fraunces',serif;font-size:1rem;}
.mov-amt.pos{color:var(--accent);}
.mov-amt.neg{color:var(--green);}
.mov-run{font-size:.7rem;color:var(--muted);margin-top:1px;}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-left:5px;}
.tag-acq{background:var(--accent-soft);color:var(--accent);}
.tag-acc{background:var(--green-soft);color:var(--green);}
.tag-pag{background:var(--green-soft);color:var(--green);}
.tag-mer{background:var(--accent-soft);color:var(--accent);}

/* ── SEGNALAZIONI ── */
.seg-panel{
  background:var(--gold-soft);border:1.5px solid #e8d48a;
  border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;
}
.seg-panel h3{font-family:'Fraunces',serif;font-size:1rem;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.seg-item{
  background:#fff;border-radius:var(--radius-sm);padding:12px 14px;
  border:1.5px solid #e8d48a;margin-bottom:8px;
}
.seg-item:last-child{margin-bottom:0;}
.seg-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.seg-desc{font-size:.87rem;font-weight:500;}
.seg-meta{font-size:.75rem;color:var(--muted);margin-top:3px;}
.seg-actions{display:flex;gap:6px;margin-top:10px;}

/* ── VIEWER SEGNALA ── */
.viewer-banner{
  background:var(--green);color:#fff;border-radius:var(--radius);
  padding:14px 18px;margin-bottom:16px;
  display:flex;align-items:center;gap:12px;
}
.viewer-banner h3{font-family:'Fraunces',serif;font-size:1.1rem;}
.viewer-banner p{font-size:.8rem;opacity:.85;margin-top:2px;}
.segnala-box{
  background:var(--blue-soft);border:1.5px solid #c5d8f5;
  border-radius:var(--radius);padding:15px 18px;margin-bottom:14px;
}
.segnala-box h3{font-family:'Fraunces',serif;font-size:1rem;color:var(--blue);margin-bottom:10px;}

/* ── NOTIFICHE PANEL ── */
.notif-panel{
  position:fixed;top:60px;right:16px;
  background:var(--card);border-radius:var(--radius);
  border:1.5px solid var(--border);box-shadow:var(--shadow-lg);
  width:320px;max-height:400px;overflow-y:auto;
  z-index:150;animation:slideUp .18s ease;
}
.notif-header{
  padding:13px 16px;border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.notif-header h4{font-family:'Fraunces',serif;font-size:.98rem;}
.notif-item{
  padding:12px 15px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;
}
.notif-item:hover{background:var(--cream);}
.notif-item:last-child{border-bottom:none;}
.notif-item.unread{background:var(--gold-soft);}
.notif-title{font-size:.85rem;font-weight:600;}
.notif-sub{font-size:.77rem;color:var(--muted);margin-top:2px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:36px 20px;color:var(--muted);}
.empty .ico{font-size:2.2rem;margin-bottom:10px;}
.empty p{font-size:.88rem;}

/* ── GOOGLE BTN ── */
.google-btn{
  width:100%;padding:11px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;gap:10px;
  cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;
  transition:all .15s;color:var(--ink);
}
.google-btn:hover{background:var(--cream);}
.google-logo{width:18px;height:18px;}

/* ── DRIVE STATUS ── */
.drive-status{
  display:flex;align-items:center;gap:6px;
  font-size:.75rem;color:var(--muted);
}
.drive-dot{width:7px;height:7px;border-radius:50%;background:var(--border);}
.drive-dot.connected{background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);
  padding:10px 22px;border-radius:30px;font-size:.86rem;
  z-index:999;white-space:nowrap;
  animation:toastIn .22s ease,toastOut .22s ease 2.3s forwards;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0}}

/* ── RESPONSIVE ── */
@media(max-width:580px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .stats-grid>*:last-child{grid-column:span 2;}
  .form-row{grid-template-columns:1fr;}
  .modal{padding:18px;}
  .setup-card{padding:24px 18px;}
  .notif-panel{width:calc(100vw - 32px);right:16px;}
}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — inserisci qui il tuo Client ID Google
// ═══════════════════════════════════════════════════
const GOOGLE_CLIENT_ID = '811683392019-rc23c41rb4v5al510hi1c4a5icengv78.apps.googleusercontent.com'; // ← da sostituire
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const FILE_NAME = 'librodare_data.json';

// ═══════════════════════════════════════════════════
// STATO APP
// ═══════════════════════════════════════════════════
let APP = {
  mode: null,        // 'admin' | 'viewer' | null
  page: 'dashboard', // 'dashboard' | 'client'
  clientId: null,
  search: '',
  modal: null,
  showNotif: false,
  driveReady: false,
  driveFileId: null,
  syncing: false,
  DB: { clients: [], pin: '1234', segnalazioni: [] },
  pinInput: '',
  pinError: '',
  viewerClientId: null,
};

// ═══════════════════════════════════════════════════
// ROUTING URL
// ═══════════════════════════════════════════════════
function parseRoute() {
  const h = location.hash;
  if (h.startsWith('#/v/')) return { type: 'viewer', id: h.slice(4) };
  if (h.startsWith('#/c/')) return { type: 'client', id: h.slice(4) };
  return { type: 'dashboard' };
}
window.addEventListener('hashchange', () => { initRoute(); render(); });

function initRoute() {
  const r = parseRoute();
  if (r.type === 'viewer') {
    APP.mode = 'viewer';
    APP.viewerClientId = r.id;
    APP.page = 'client';
    APP.clientId = r.id;
  } else if (r.type === 'client' && APP.mode === 'admin') {
    APP.page = 'client';
    APP.clientId = r.id;
  } else if (r.type === 'dashboard') {
    APP.page = 'dashboard';
    APP.clientId = null;
  }
}

// ═══════════════════════════════════════════════════
// LOCAL STORAGE (fallback)
// ═══════════════════════════════════════════════════
const LS_KEY = 'librodare_v2';
function lsLoad() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || { clients:[], pin:'1234', segnalazioni:[] }; }
  catch { return { clients:[], pin:'1234', segnalazioni:[] }; }
}
function lsSave(db) { localStorage.setItem(LS_KEY, JSON.stringify(db)); }

// ═══════════════════════════════════════════════════
// GOOGLE DRIVE
// ═══════════════════════════════════════════════════
let gToken = null;

function loadGIS() {
  return new Promise(res => {
    if (window.google?.accounts?.oauth2) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = res; document.head.appendChild(s);
  });
}

async function driveLogin() {
  await loadGIS();
  return new Promise((resolve, reject) => {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: async (resp) => {
        if (resp.error) { reject(resp.error); return; }
        gToken = resp.access_token;
        APP.driveReady = true;
        await driveSync();
        resolve();
      }
    });
    client.requestAccessToken();
  });
}

async function driveSync() {
  if (!gToken) return;
  APP.syncing = true; renderSyncState();
  try {
    // cerca file esistente
    const search = await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id,name)`,
      { headers: { Authorization: `Bearer ${gToken}` } }
    );
    const sr = await search.json();
    if (sr.files && sr.files.length > 0) {
      APP.driveFileId = sr.files[0].id;
      await driveLoad();
    } else {
      await driveSave();
    }
  } catch(e) { console.error('Drive sync error', e); }
  APP.syncing = false; renderSyncState();
}

async function driveLoad() {
  if (!gToken || !APP.driveFileId) return;
  try {
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files/${APP.driveFileId}?alt=media`,
      { headers: { Authorization: `Bearer ${gToken}` } }
    );
    const data = await r.json();
    if (data && data.clients !== undefined) {
      APP.DB = data;
      lsSave(APP.DB);
    }
  } catch(e) { console.error('Drive load error', e); }
}

async function driveSave() {
  if (!gToken) { lsSave(APP.DB); return; }
  lsSave(APP.DB);
  try {
    const body = JSON.stringify(APP.DB);
    const meta = { name: FILE_NAME, parents: ['appDataFolder'] };
    if (APP.driveFileId) {
      await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${APP.driveFileId}?uploadType=media`,
        { method:'PATCH', headers:{ Authorization:`Bearer ${gToken}`, 'Content-Type':'application/json' }, body }
      );
    } else {
      const boundary = '-------314159265358979323846';
      const multipart = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
      const r = await fetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        { method:'POST', headers:{ Authorization:`Bearer ${gToken}`, 'Content-Type':`multipart/related; boundary="${boundary}"` }, body: multipart }
      );
      const rf = await r.json();
      APP.driveFileId = rf.id;
    }
  } catch(e) { console.error('Drive save error', e); }
}

function renderSyncState() {
  const el = document.getElementById('driveStatus');
  if (!el) return;
  if (APP.syncing) el.innerHTML = '<span class="drive-dot"></span> Sincronizzazione…';
  else if (APP.driveReady) el.innerHTML = '<span class="drive-dot connected"></span> Drive connesso';
  else el.innerHTML = '<span class="drive-dot"></span> Solo locale';
}

// ═══════════════════════════════════════════════════
// DB HELPERS
// ═══════════════════════════════════════════════════
function getClients() { return APP.DB.clients || []; }
function getClient(id) { return (APP.DB.clients||[]).find(c=>c.id===id); }
function getSegnalazioni(clientId) {
  return (APP.DB.segnalazioni||[]).filter(s => !clientId || s.clientId === clientId);
}
function getPendingSegnalazioni() {
  return (APP.DB.segnalazioni||[]).filter(s=>s.stato==='pending');
}

function saveDB() { driveSave(); }

function addClient(name, phone, note) {
  const c = { id: Date.now().toString(), name, phone, note, createdAt: new Date().toISOString(), movimenti: [] };
  APP.DB.clients.push(c); saveDB(); return c;
}
function editClient(id, name, phone, note) {
  const c = getClient(id); if(!c) return;
  c.name=name; c.phone=phone; c.note=note; saveDB();
}
function deleteClient(id) {
  APP.DB.clients = APP.DB.clients.filter(c=>c.id!==id);
  APP.DB.segnalazioni = (APP.DB.segnalazioni||[]).filter(s=>s.clientId!==id);
  saveDB();
}
function addMovimento(clientId, tipo, importo, desc, data, note) {
  const c = getClient(clientId); if(!c) return;
  const m = { id: Date.now().toString(), tipo, importo:parseFloat(importo), descrizione:desc, data, note, createdAt:new Date().toISOString() };
  c.movimenti.push(m); saveDB(); return m;
}
function deleteMovimento(clientId, movId) {
  const c = getClient(clientId); if(!c) return;
  c.movimenti = c.movimenti.filter(m=>m.id!==movId); saveDB();
}
function addSegnalazione(clientId, clientName, tipo, desc, importo, data, note) {
  if (!APP.DB.segnalazioni) APP.DB.segnalazioni = [];
  const s = {
    id: Date.now().toString(),
    clientId, clientName, tipo, descrizione:desc,
    importo:parseFloat(importo)||0, data, note,
    stato:'pending',
    createdAt: new Date().toISOString()
  };
  APP.DB.segnalazioni.push(s); saveDB(); return s;
}
function approvaSegnalazione(segId) {
  const s = (APP.DB.segnalazioni||[]).find(x=>x.id===segId); if(!s) return;
  addMovimento(s.clientId, s.tipo, s.importo, s.descrizione, s.data, s.note || 'Approvato da segnalazione cliente');
  s.stato = 'approved'; saveDB();
}
function rifiutaSegnalazione(segId) {
  const s = (APP.DB.segnalazioni||[]).find(x=>x.id===segId); if(!s) return;
  s.stato = 'rejected'; saveDB();
}

function getSaldo(client) {
  return (client.movimenti||[]).reduce((sum,m) => {
    if (m.tipo==='acquisto'||m.tipo==='merce') return sum+m.importo;
    return sum-m.importo;
  }, 0);
}
function getRunning(movimenti) {
  let s=0;
  return movimenti.map(m => {
    if (m.tipo==='acquisto'||m.tipo==='merce') s+=m.importo; else s-=m.importo;
    return s;
  });
}

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function fmt(n) { return '€'+Math.abs(parseFloat(n)||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtD(d) { try{return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})}catch{return d||''} }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function nowT() { return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}); }
function today() { return new Date().toISOString().split('T')[0]; }
function viewLink(id) { return location.origin+location.pathname+'#/v/'+id; }

// RENDER ROOT
// ═══════════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');
  const r = parseRoute();

  // VIEWER MODE
  if (r.type === 'viewer') {
    APP.mode = 'viewer';
    root.innerHTML = renderViewer(r.id);
    return;
  }

  // SETUP: no client ID configurato
  if (GOOGLE_CLIENT_ID === 'PLACEHOLDER_NON_USATO') {
    root.innerHTML = renderSetupClientId();
    return;
  }

  // PIN
  if (!APP.mode) {
    root.innerHTML = renderPinScreen();
    return;
  }

  // ADMIN
  let content = '';
  if (APP.page === 'client' && APP.clientId) content = renderClientDetail(APP.clientId);
  else content = renderDashboard();

  root.innerHTML = `
    ${renderTopbar()}
    <div class="wrap" style="padding-top:20px;padding-bottom:40px">
      ${content}
    </div>
    ${APP.modal ? renderModal() : ''}
    ${APP.showNotif ? renderNotifPanel() : ''}
  `;
}

          <input id="seg-importo" type="number" min="0" step="0.01" placeholder="0.00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Data</label>
          <input id="seg-data" type="date" value="${today()}">
        </div>
        <div class="form-group">
          <label>Descrizione</label>
          <input id="seg-desc" type="text" placeholder="Es. Acconto del 10 marzo">
        </div>
      </div>
      <div class="form-group">
        <label>Note aggiuntive</label>
        <textarea id="seg-note" placeholder="Aggiungi dettagli se vuoi…" style="min-height:56px"></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="inviaSegn('${id}','${esc(c.name)}')">📤 Invia segnalazione</button>
    </div>
    <div class="mov-head"><h3>I tuoi movimenti (${movs.length})</h3></div>
    <div class="mov-list">
      ${movs.length===0?`<div class="empty"><div class="ico">📋</div><p>Nessun movimento registrato</p></div>`:
      movs.map((m,i)=>{
        const isPos=m.tipo==='acquisto'||m.tipo==='merce';
        const icons={acquisto:'🛍️',acconto:'💸',pagamento:'✅',merce:'📦'};
        return `
        <div class="mov-item">
          <div class="mov-ico ico-${m.tipo==='acconto'?'acc':m.tipo==='pagamento'?'pag':m.tipo==='merce'?'mer':'acq'}">${icons[m.tipo]||'•'}</div>
          <div class="mov-body">
            <div class="mov-desc">${esc(m.descrizione)}<span class="tag tag-${m.tipo==='acconto'?'acc':m.tipo==='pagamento'?'pag':m.tipo==='merce'?'mer':'acq'}">${m.tipo}</span></div>
            <div class="mov-meta">${fmtD(m.data)}</div>
            ${m.note?`<div class="mov-note">${esc(m.note)}</div>`:''}
          </div>
          <div class="mov-right">
            <div class="mov-amt ${isPos?'pos':'neg'}">${isPos?'+':'-'}${fmt(m.importo)}</div>
            <div class="mov-run">saldo: ${fmt(run[i])}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// NOTIFICHE PANEL
// ═══════════════════════════════════════════════════
function renderNotifPanel() {
  const segs = getPendingSegnalazioni();
  return `
  <div class="notif-panel">
    <div class="notif-header">
      <h4>🔔 Segnalazioni (${segs.length})</h4>
      <button class="btn-ghost" onclick="APP.showNotif=false;render()">✕</button>
    </div>
    ${segs.length===0?`<div class="empty" style="padding:20px"><p>Nessuna segnalazione</p></div>`:
    segs.map(s=>`
    <div class="notif-item unread" onclick="openClient('${s.clientId}');APP.showNotif=false;">
      <div class="notif-title">${esc(s.clientName)} — ${fmt(s.importo)}</div>
      <div class="notif-sub">${esc(s.descrizione)} · ${fmtD(s.createdAt)}</div>
    </div>`).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════
function renderModal() {
  const m = APP.modal;
  if (!m) return '';
  let body = '';

  if (m.type==='addClient') {
    body=`<h2>👤 Nuovo Cliente</h2>
    <div class="form-group"><label>Nome *</label><input id="m-name" type="text" placeholder="Es. Corrado Rossi"></div>
    <div class="form-row">
      <div class="form-group"><label>Telefono</label><input id="m-phone" type="tel" placeholder="333 1234567"></div>
      <div class="form-group"><label>Note</label><input id="m-note" type="text" placeholder="Facoltativo"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="submitAddClient()">Salva</button>
    </div>`;
  }
  else if (m.type==='editClient') {
    const c=getClient(m.id);
    body=`<h2>✏️ Modifica</h2>
    <div class="form-group"><label>Nome *</label><input id="m-name" type="text" value="${esc(c?.name||'')}"></div>
    <div class="form-row">
      <div class="form-group"><label>Telefono</label><input id="m-phone" type="tel" value="${esc(c?.phone||'')}"></div>
      <div class="form-group"><label>Note</label><input id="m-note" type="text" value="${esc(c?.note||'')}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="submitEdit('${m.id}')">Salva</button>
    </div>`;
  }
  else if (m.type==='addMov') {
    const labels={acquisto:'🛍️ Acquisto',acconto:'💸 Acconto',pagamento:'✅ Pagamento',merce:'📦 Merce da te'};
    body=`<h2>${labels[m.tipo]}</h2>
    <div class="form-row">
      <div class="form-group"><label>Data *</label><input id="m-data" type="date" value="${today()}"></div>
      <div class="form-group"><label>Importo (€) *</label><input id="m-imp" type="number" min="0.01" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="form-group"><label>Descrizione *</label><input id="m-desc" type="text" placeholder="${m.tipo==='acquisto'?'Es. Scarpe Nike':m.tipo==='merce'?'Es. Borsa consegnata':'Es. Acconto contanti'}"></div>
    <div class="form-group"><label>Tipo</label>
      <select id="m-tipo">
        <option value="acquisto" ${m.tipo==='acquisto'?'selected':''}>🛍️ Acquisto (deve a te)</option>
        <option value="acconto" ${m.tipo==='acconto'?'selected':''}>💸 Acconto (scala debito)</option>
        <option value="pagamento" ${m.tipo==='pagamento'?'selected':''}>✅ Pagamento completo</option>
        <option value="merce" ${m.tipo==='merce'?'selected':''}>📦 Merce da te (aggiunge a debito)</option>
      </select>
    </div>
    <div class="form-group"><label>Note</label><textarea id="m-note" placeholder="Facoltativo…"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="submitMov('${m.clientId}')">Aggiungi</button>
    </div>`;
  }
  else if (m.type==='confirm') {
    body=`<h2>⚠️ Conferma</h2>
    <p style="font-size:.9rem;color:var(--muted);line-height:1.5">${m.text}</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annulla</button>
      <button class="btn btn-danger" onclick="(${m.cb})()">Conferma</button>
    </div>`;
  }
  else if (m.type==='changePin') {
    body=`<h2>🔐 Cambia PIN</h2>
    <div class="form-group"><label>PIN attuale</label><input id="m-old" type="password" maxlength="6"></div>
    <div class="form-group"><label>Nuovo PIN</label><input id="m-new" type="password" maxlength="6"></div>
    <div class="form-group"><label>Conferma</label><input id="m-new2" type="password" maxlength="6"></div>
    <div id="pin-err" style="color:var(--accent);font-size:.83rem;min-height:16px"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="submitPin()">Salva</button>
    </div>`;
  }
  else if (m.type==='segnalazioni') {
    const segs = getPendingSegnalazioni();
    body=`<h2>⏳ Segnalazioni in attesa</h2>
    ${segs.length===0?'<p style="color:var(--muted);font-size:.9rem">Nessuna segnalazione</p>':
    segs.map(s=>`
    <div class="seg-item" style="margin-bottom:10px">
      <div class="seg-desc">${esc(s.clientName)} — ${esc(s.descrizione)} — ${fmt(s.importo)} <span class="tag tag-${s.tipo==='acquisto'||s.tipo==='merce'?'acq':'acc'}">${s.tipo}</span></div>
      <div class="seg-meta">${fmtD(s.data)}${s.note?' · '+esc(s.note):''}</div>
      <div class="seg-actions">
        <button class="btn btn-success btn-xs" onclick="approva('${s.id}')">✓ Approva</button>
        <button class="btn btn-danger btn-xs" onclick="rifiuta('${s.id}')">✗ Rifiuta</button>
      </div>
    </div>`).join('')}
    <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Chiudi</button></div>`;
  }

  return `<div class="overlay" onclick="overlayClose(event)"><div class="modal">${body}</div></div>`;
}

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════
function pinKey(k) {
  if(k==='del'){APP.pinInput=APP.pinInput.slice(0,-1);APP.pinError='';render();return;}
  if(APP.pinInput.length>=6) return;
  APP.pinInput+=k;
  if(APP.pinInput.length>=4){
    if(APP.pinInput===APP.DB.pin){APP.mode='admin';APP.pinInput='';APP.pinError='';render();}
    else if(APP.pinInput.length>=(APP.DB.pin.length)){
      APP.pinError='PIN errato';
      setTimeout(()=>{APP.pinInput='';APP.pinError='';render();},900);
    }
    render();return;
  }
  render();
}
async function loginWithGoogle() {
  try {
    APP.DB = lsLoad();
    await driveLogin();
    APP.mode = 'admin';
    render();
  } catch(e) {
    showToast('Errore accesso Google: '+e);
  }
}
function logout(){APP.mode=null;APP.pinInput='';location.hash='';render();}
function goHome(){APP.page='dashboard';APP.clientId=null;location.hash='';render();}
function openClient(id){APP.page='client';APP.clientId=id;location.hash='#/c/'+id;render();}
function closeModal(){APP.modal=null;render();}
function overlayClose(e){if(e.target.classList.contains('overlay'))closeModal();}
function showModal(m){APP.modal=m;render();}
function toggleNotif(){APP.showNotif=!APP.showNotif;render();}
function renderContent(){render();}

function submitAddClient(){
  const n=document.getElementById('m-name').value.trim();
  if(!n){showToast('Inserisci il nome!');return;}
  addClient(n,document.getElementById('m-phone').value.trim(),document.getElementById('m-note').value.trim());
  closeModal();showToast('Cliente aggiunto!');
}
function submitEdit(id){
  const n=document.getElementById('m-name').value.trim();
  if(!n){showToast('Inserisci il nome!');return;}
  editClient(id,n,document.getElementById('m-phone').value.trim(),document.getElementById('m-note').value.trim());
  closeModal();showToast('Salvato!');
}
function submitMov(clientId){
  const tipo=document.getElementById('m-tipo').value;
  const imp=document.getElementById('m-imp').value;
  const desc=document.getElementById('m-desc').value.trim();
  const data=document.getElementById('m-data').value;
  const note=document.getElementById('m-note').value.trim();
  if(!imp||!desc||!data){showToast('Compila tutti i campi!');return;}
  addMovimento(clientId,tipo,imp,desc,data,note);
  closeModal();showToast('Movimento aggiunto!');
}
function submitPin(){
  const old=document.getElementById('m-old').value;
  const np=document.getElementById('m-new').value;
  const np2=document.getElementById('m-new2').value;
  const err=document.getElementById('pin-err');
  if(old!==APP.DB.pin){err.textContent='PIN attuale errato';return;}
  if(np.length<4){err.textContent='Minimo 4 cifre';return;}
  if(np!==np2){err.textContent='I PIN non coincidono';return;}
  APP.DB.pin=np;saveDB();closeModal();showToast('PIN cambiato!');
}
function confirmDel(id){
  const c=getClient(id);
  showModal({type:'confirm',text:`Eliminare <strong>${esc(c?.name)}</strong> e tutti i suoi movimenti?`,cb:`function(){deleteClient('${id}');APP.page='dashboard';APP.clientId=null;location.hash='';closeModal();render();showToast('Eliminato');}`});
}
function confirmDelMov(cid,mid){
  showModal({type:'confirm',text:'Eliminare questo movimento?',cb:`function(){deleteMovimento('${cid}','${mid}');closeModal();render();showToast('Eliminato');}`});
}
function approva(segId){
  approvaSegnalazione(segId);render();showToast('✅ Movimento approvato e aggiunto!');
}
function rifiuta(segId){
  rifiutaSegnalazione(segId);render();showToast('Segnalazione rifiutata');
}
function inviaSegn(clientId, clientName) {
  const tipo=document.getElementById('seg-tipo').value;
  const imp=document.getElementById('seg-importo').value;
  const desc=document.getElementById('seg-desc').value.trim();
  const data=document.getElementById('seg-data').value;
  const note=document.getElementById('seg-note').value.trim();
  if(!imp||!desc){showToast('Compila importo e descrizione!');return;}
  addSegnalazione(clientId,clientName,tipo,desc,imp,data,note);
  showToast('✅ Segnalazione inviata! Il titolare la esaminerà.');
  document.getElementById('seg-importo').value='';
  document.getElementById('seg-desc').value='';
  document.getElementById('seg-note').value='';
}
function copyText(t){
  navigator.clipboard.writeText(t).then(()=>showToast('Copiato!')).catch(()=>showToast('Copia manualmente'));
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
function showToast(msg){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2600);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
// Carica client ID da localStorage se salvato
(function(){
  const saved = localStorage.getItem('ld_client_id');
  if(saved && saved.includes('googleusercontent.com')) {
    // patch runtime
    window.GOOGLE_CLIENT_ID_RUNTIME = saved;
  }
  APP.DB = lsLoad();
  initRoute();
  render();
})();
</script>
