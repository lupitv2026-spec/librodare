<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LibroDare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#22223a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0eee8;--text2:#9896a4;--text3:#5c5a6a;
  --accent:#e8c547;--accent-dim:rgba(232,197,71,0.12);
  --red:#f06449;--red-dim:rgba(240,100,73,0.12);
  --green:#4ecb8d;--green-dim:rgba(78,203,141,0.12);
  --blue:#6b8cff;--blue-dim:rgba(107,140,255,0.12);
  --radius:16px;--radius-sm:10px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--shadow-lg:0 12px 48px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.wrap{max-width:800px;margin:0 auto;padding:0 16px;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,10,15,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:13px 0;}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),#f0a832);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 0 20px rgba(232,197,71,0.25);}
.logo h1{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text);}
.logo span{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;display:block;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.badge{padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.badge-admin{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(232,197,71,0.2);}
.badge-view{background:var(--green-dim);color:var(--green);border:1px solid rgba(78,203,141,0.2);}
.notif-btn{position:relative;width:34px;height:34px;border-radius:9px;border:1px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s;}
.notif-badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;width:15px;height:15px;border-radius:50%;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;}
.icon-btn:hover{background:var(--surface);color:var(--text);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:.87rem;font-weight:600;transition:all .16s;white-space:nowrap;}
.btn-gold{background:linear-gradient(135deg,var(--accent),#f0a832);color:#0a0a0f;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(232,197,71,0.3);}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(240,100,73,0.2);}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(78,203,141,0.2);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{background:var(--surface);color:var(--text);}
.btn-ghost{background:transparent;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:.82rem;cursor:pointer;padding:4px 8px;}
.btn-ghost:hover{color:var(--text);}
.btn-sm{padding:7px 14px;font-size:.8rem;border-radius:8px;}
.btn-xs{padding:5px 10px;font-size:.74rem;border-radius:7px;}
.btn:active{transform:scale(0.97);}
.pin-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(232,197,71,0.06) 0%,transparent 70%);}
.pin-card{background:var(--surface);border-radius:24px;padding:36px 28px;max-width:320px;width:100%;border:1px solid var(--border2);box-shadow:var(--shadow-lg);text-align:center;}
.pin-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),#f0a832);border-radius:16px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 30px rgba(232,197,71,0.2);}
.pin-card h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:4px;}
.pin-card p{font-size:.83rem;color:var(--text3);margin-bottom:28px;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:24px;}
.pin-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--border2);transition:all .15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(232,197,71,0.5);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.pin-key{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:1.2rem;font-weight:600;cursor:pointer;font-family:'Playfair Display',serif;transition:all .12s;color:var(--text);}
.pin-key:hover{background:var(--surface3);}
.pin-key:active{transform:scale(0.93);}
.pin-key.del{font-size:.85rem;color:var(--red);font-family:'Inter',sans-serif;}
.pin-error{color:var(--red);font-size:.8rem;margin-top:10px;min-height:18px;}
.setup-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(107,140,255,0.06) 0%,transparent 70%);}
.setup-card{background:var(--surface);border-radius:24px;padding:32px 28px;max-width:400px;width:100%;border:1px solid var(--border2);box-shadow:var(--shadow-lg);}
.setup-card .ico{font-size:2.2rem;margin-bottom:12px;}
.setup-card h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:6px;}
.setup-card p{font-size:.84rem;color:var(--text2);line-height:1.6;margin-bottom:18px;}
.steps-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:16px;border:1px solid var(--border);}
.steps-box ol{padding-left:18px;font-size:.82rem;color:var(--text2);line-height:2;}
.steps-box strong{color:var(--accent);}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:.9rem;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:rgba(232,197,71,0.4);}
.form-group select{cursor:pointer;}
.form-group textarea{resize:vertical;min-height:70px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;border:1px solid var(--border2);border-bottom:none;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal h2{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0 22px;}
.stat{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border);}
.stat .lbl{font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.stat .val{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;}
.val-gold{color:var(--accent);}
.val-red{color:var(--red);}
.val-green{color:var(--green);}
.dash-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.dash-head h2{font-family:'Playfair Display',serif;font-size:1.4rem;}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:260px;}
.search-wrap input{width:100%;padding:9px 13px 9px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:.86rem;background:var(--surface);color:var(--text);outline:none;}
.search-wrap input::placeholder{color:var(--text3);}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none;}
.client-list{display:grid;gap:8px;}
.client-row{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .17s;}
.client-row:hover{border-color:var(--border2);background:var(--surface2);transform:translateX(2px);}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--surface3),var(--surface2));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.1rem;flex-shrink:0;}
.client-info{flex:1;min-width:0;}
.client-name{font-weight:600;font-size:.95rem;}
.client-meta{font-size:.74rem;color:var(--text3);margin-top:2px;}
.client-bal{text-align:right;flex-shrink:0;}
.bal-amt{font-family:'Playfair Display',serif;font-size:1.05rem;}
.bal-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.5px;margin-top:1px;font-weight:600;}
.bal-pos .bal-amt,.bal-pos .bal-lbl{color:var(--red);}
.bal-neg .bal-amt,.bal-neg .bal-lbl{color:var(--green);}
.bal-zero .bal-amt,.bal-zero .bal-lbl{color:var(--text3);}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-size:.84rem;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;margin-bottom:16px;padding:0;}
.back-btn:hover{color:var(--text);}
.client-hero{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:12px;position:relative;overflow:hidden;}
.client-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(232,197,71,0.07),transparent);}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.hero-left{display:flex;align-items:center;gap:14px;}
.avatar-lg{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--surface3),var(--surface2));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.4rem;flex-shrink:0;}
.hero-name{font-family:'Playfair Display',serif;font-size:1.3rem;}
.hero-sub{font-size:.78rem;color:var(--text3);margin-top:3px;}
.saldo-block{text-align:right;}
.saldo-lbl{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.saldo-val{font-family:'Playfair Display',serif;font-size:1.8rem;line-height:1.1;}
.action-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.share-box{background:var(--blue-dim);border:1px solid rgba(107,140,255,0.2);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.share-box p{font-size:.8rem;color:var(--blue);font-weight:600;}
.share-link{font-size:.72rem;color:var(--text3);word-break:break-all;margin-top:2px;}
.mov-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mov-head h3{font-family:'Playfair Display',serif;font-size:1rem;}
.mov-list{display:grid;gap:6px;}
.mov-item{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:11px;}
.mov-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.ico-acq,.ico-mer{background:var(--red-dim);}
.ico-acc,.ico-pag{background:var(--green-dim);}
.mov-body{flex:1;min-width:0;}
.mov-desc{font-size:.86rem;font-weight:500;}
.mov-meta{font-size:.72rem;color:var(--text3);margin-top:2px;}
.mov-note{font-size:.71rem;color:var(--text3);font-style:italic;margin-top:1px;}
.mov-right{text-align:right;flex-shrink:0;}
.mov-amt{font-family:'Playfair Display',serif;font-size:.98rem;}
.mov-amt.pos{color:var(--red);}
.mov-amt.neg{color:var(--green);}
.mov-run{font-size:.68rem;color:var(--text3);margin-top:1px;}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-left:5px;}
.tag-acq,.tag-mer{background:var(--red-dim);color:var(--red);}
.tag-acc,.tag-pag{background:var(--green-dim);color:var(--green);}
.seg-panel{background:rgba(232,197,71,0.05);border:1px solid rgba(232,197,71,0.15);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.seg-panel h3{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--accent);margin-bottom:12px;}
.seg-item{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border);margin-bottom:8px;}
.seg-item:last-child{margin-bottom:0;}
.seg-desc{font-size:.85rem;font-weight:500;}
.seg-meta{font-size:.73rem;color:var(--text3);margin-top:3px;}
.seg-actions{display:flex;gap:6px;margin-top:10px;}
.viewer-hero{background:linear-gradient(135deg,rgba(78,203,141,0.1),rgba(78,203,141,0.03));border:1px solid rgba(78,203,141,0.2);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.viewer-hero h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--green);}
.viewer-hero p{font-size:.78rem;color:var(--text3);margin-top:2px;}
.segnala-box{background:var(--blue-dim);border:1px solid rgba(107,140,255,0.2);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.segnala-box h3{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--blue);margin-bottom:8px;}
.notif-panel{position:fixed;top:62px;right:16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border2);box-shadow:var(--shadow-lg);width:300px;max-height:380px;overflow-y:auto;z-index:150;animation:slideUp .18s ease;}
.notif-header{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);}
.notif-header h4{font-family:'Playfair Display',serif;font-size:.95rem;}
.notif-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.notif-item:hover{background:var(--surface2);}
.notif-item:last-child{border-bottom:none;}
.notif-item.unread{background:rgba(232,197,71,0.04);}
.notif-title{font-size:.83rem;font-weight:600;}
.notif-sub{font-size:.74rem;color:var(--text3);margin-top:2px;}
.alert-banner{background:rgba(232,197,71,0.08);border:1px solid rgba(232,197,71,0.2);border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.alert-banner p{font-size:.83rem;color:var(--accent);font-weight:500;}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty .ico{font-size:2rem;margin-bottom:10px;opacity:.5;}
.empty p{font-size:.86rem;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px 20px;color:var(--text3);font-size:.85rem;}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:30px;font-size:.84rem;font-weight:500;z-index:999;white-space:nowrap;border:1px solid var(--border2);box-shadow:var(--shadow);animation:toastIn .22s ease,toastOut .22s ease 2.3s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0}}
.sync-dot{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text3);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.dot.ok{background:var(--green);box-shadow:0 0 6px rgba(78,203,141,0.5);}
.dot.sync{background:var(--accent);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:540px){.stats-grid{grid-template-columns:1fr 1fr;}.stats-grid>*:last-child{grid-column:span 2;}.form-row{grid-template-columns:1fr;}.action-row .btn-sm{padding:7px 10px;font-size:.76rem;}}
@media(min-width:600px){.overlay{align-items:center;}.modal{border-radius:24px;max-height:85vh;}}
</style>

<body>
<div id="root"></div>
<script>
const NPOINT_BASE='https://api.npoint.io';
let NPOINT_ID=localStorage.getItem('ld_np')||'';

let APP={mode:null,page:'dashboard',clientId:null,search:'',modal:null,showNotif:false,syncing:false,syncOk:false,DB:{clients:[],pin:'1234',segnalazioni:[],v:1},pinInput:'',pinError:''};
function parseRoute(){const h=location.hash;if(h.startsWith('#/v/'))return{type:'viewer',id:h.slice(4)};if(h.startsWith('#/c/'))return{type:'client',id:h.slice(4)};return{type:'dashboard'};}
window.addEventListener('hashchange',()=>{initRoute();render();});
function initRoute(){const r=parseRoute();if(r.type==='viewer'){APP.mode='viewer';APP.clientId=r.id;APP.page='client';}else if(r.type==='client'&&APP.mode==='admin'){APP.page='client';APP.clientId=r.id;}else if(r.type==='dashboard'){APP.page='dashboard';APP.clientId=null;}}
async function jbLoad(){if(!NPOINT_ID)return false;APP.syncing=true;rSD();try{const r=await fetch(`${NPOINT_BASE}/${NPOINT_ID}`);if(!r.ok)throw new Error();const d=await r.json();APP.DB=d||APP.DB;lsSave(APP.DB);APP.syncing=false;APP.syncOk=true;rSD();return true;}catch(e){APP.syncing=false;APP.syncOk=false;rSD();return false;}}
async function jbSave(){lsSave(APP.DB);if(!NPOINT_ID){lsSave(APP.DB);return;}APP.syncing=true;rSD();try{await fetch(`${NPOINT_BASE}/${NPOINT_ID}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(APP.DB)});APP.syncing=false;APP.syncOk=true;}catch(e){APP.syncing=false;}rSD();}
async function jbCreate(){const r=await fetch(`${NPOINT_BASE}/store`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(APP.DB)});if(!r.ok)throw new Error();const d=await r.json();return d.id;}
function rSD(){const el=document.getElementById('syncDot');if(!el)return;if(APP.syncing)el.innerHTML='<span class="dot sync"></span> Sinc…';else if(APP.syncOk)el.innerHTML='<span class="dot ok"></span> Online';else el.innerHTML='<span class="dot"></span> Locale';}
const LS='ld_db_v3';
function lsLoad(){try{return JSON.parse(localStorage.getItem(LS))||{clients:[],pin:'1234',segnalazioni:[],v:1};}catch{return{clients:[],pin:'1234',segnalazioni:[],v:1};}}
function lsSave(db){localStorage.setItem(LS,JSON.stringify(db));}
function getClient(id){return(APP.DB.clients||[]).find(c=>c.id===id);}
function getPending(){return(APP.DB.segnalazioni||[]).filter(s=>s.stato==='pending');}
function getSaldo(c){return(c.movimenti||[]).reduce((s,m)=>(m.tipo==='acquisto'||m.tipo==='merce')?s+m.importo:s-m.importo,0);}
function getRunning(movs){let s=0;return movs.map(m=>{if(m.tipo==='acquisto'||m.tipo==='merce')s+=m.importo;else s-=m.importo;return s;});}
function saveDB(){jbSave();}
function addClient(n,p,no){const c={id:Date.now().toString(),name:n,phone:p,note:no,createdAt:new Date().toISOString(),movimenti:[]};APP.DB.clients.push(c);saveDB();return c;}
function editClient(id,n,p,no){const c=getClient(id);if(!c)return;c.name=n;c.phone=p;c.note=no;saveDB();}
function deleteClient(id){APP.DB.clients=APP.DB.clients.filter(c=>c.id!==id);APP.DB.segnalazioni=(APP.DB.segnalazioni||[]).filter(s=>s.clientId!==id);saveDB();}
function addMov(cid,tipo,imp,desc,data,note){const c=getClient(cid);if(!c)return;const m={id:Date.now().toString(),tipo,importo:parseFloat(imp),descrizione:desc,data,note,createdAt:new Date().toISOString()};c.movimenti.push(m);saveDB();return m;}
function delMov(cid,mid){const c=getClient(cid);if(!c)return;c.movimenti=c.movimenti.filter(m=>m.id!==mid);saveDB();}
function addSeg(cid,cname,tipo,desc,imp,data,note){if(!APP.DB.segnalazioni)APP.DB.segnalazioni=[];const s={id:Date.now().toString(),clientId:cid,clientName:cname,tipo,descrizione:desc,importo:parseFloat(imp)||0,data,note,stato:'pending',createdAt:new Date().toISOString()};APP.DB.segnalazioni.push(s);saveDB();return s;}
function approvaSeg(id){const s=(APP.DB.segnalazioni||[]).find(x=>x.id===id);if(!s)return;addMov(s.clientId,s.tipo,s.importo,s.descrizione,s.data,s.note||'Da segnalazione');s.stato='approved';saveDB();}
function rifiutaSeg(id){const s=(APP.DB.segnalazioni||[]).find(x=>x.id===id);if(!s)return;s.stato='rejected';saveDB();}
function fmt(n){return'€'+Math.abs(parseFloat(n)||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtD(d){try{return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});}catch{return d||'';}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().split('T')[0];}
function vlink(id){return location.origin+location.pathname+'#/v/'+id;}
function render(){
  const root=document.getElementById('root');
  const r=parseRoute();
  if(r.type==='viewer'){APP.mode='viewer';APP.DB=lsLoad();root.innerHTML=renderViewer(r.id);return;}
  if(!NPOINT_ID){root.innerHTML=renderSetup();return;}
  if(!APP.mode){root.innerHTML=renderPin();return;}
  let content='';
  if(APP.page==='client'&&APP.clientId)content=renderDetail(APP.clientId);
  else content=renderDash();
  root.innerHTML=`${renderTopbar()}<div class="wrap" style="padding-top:20px;padding-bottom:60px">${content}</div>${APP.modal?renderModal():''}${APP.showNotif?renderNotifPanel():''}`;
}
function renderSetup(){return`<div class="setup-screen"><div class="setup-card"><div class="ico">🚀</div><h2>Benvenuto in LibroDare</h2><p>Clicca il pulsante qui sotto per creare il tuo database online gratuito. Ci vuole solo un secondo!</p><button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:16px;padding:14px" onclick="saveJKey()">🚀 Inizia subito</button></div></div>`;}
async function saveJKey(){showToast('Creazione database…');try{APP.DB=lsLoad();const npId=await jbCreate();NPOINT_ID=npId;localStorage.setItem('ld_np',npId);APP.syncOk=true;showToast('✅ Connesso!');render();}catch(e){showToast('Errore: riprova');}}
function renderPin(){const pin=APP.pinInput;const len=APP.DB.pin.length;const dots=Array.from({length:len},(_,i)=>`<div class="pin-dot ${i<pin.length?'filled':''}"></div>`).join('');return`<div class="pin-screen"><div class="pin-card"><div class="pin-logo">📒</div><h2>LibroDare</h2><p>Inserisci il PIN per accedere</p><div class="pin-dots">${dots}</div><div class="pin-keypad">${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>{if(k==='')return'<div></div>';if(k==='⌫')return`<button class="pin-key del" onclick="pinKey('del')">⌫</button>`;return`<button class="pin-key" onclick="pinKey('${k}')">${k}</button>`;}).join('')}</div><div class="pin-error">${APP.pinError}</div></div></div>`;}
function renderTopbar(){const pend=getPending().length;return`<div class="topbar"><div class="wrap"><div class="topbar-inner"><div class="logo" onclick="goHome()"><div class="logo-mark">📒</div><div><h1>LibroDare</h1><span>Gestione crediti</span></div></div><div class="topbar-right"><div class="sync-dot" id="syncDot"><span class="dot ${APP.syncOk?'ok':''}"></span> ${APP.syncOk?'Online':'Locale'}</div><div class="notif-btn" onclick="toggleNotif()">🔔${pend>0?`<div class="notif-badge">${pend}</div>`:''}</div><span class="badge badge-admin">Admin</span><button class="icon-btn" onclick="showModal({type:'changePin'})">PIN</button><button class="btn-ghost" onclick="logout()">Esci</button></div></div></div></div>`;}
function renderDash(){const all=APP.DB.clients||[];const fil=all.filter(c=>!APP.search||c.name.toLowerCase().includes(APP.search.toLowerCase()));const totD=all.reduce((s,c)=>{const v=getSaldo(c);return v>0?s+v:s;},0);const totC=all.reduce((s,c)=>{const v=getSaldo(c);return v<0?s+Math.abs(v):s;},0);const pend=getPending().length;return`${pend>0?`<div class="alert-banner"><p>⏳ ${pend} segnalazione${pend>1?'i':''} in attesa</p><button class="btn btn-sm" style="background:var(--accent-dim);color:var(--accent);border:1px solid rgba(232,197,71,0.2)" onclick="showModal({type:'segnalazioni'})">Vedi</button></div>`:''}<div class="dash-head"><h2>Clienti</h2><div class="search-wrap"><span class="search-ico">🔍</span><input type="text" placeholder="Cerca…" value="${esc(APP.search)}" oninput="APP.search=this.value;renderContent()"></div><button class="btn btn-gold btn-sm" onclick="showModal({type:'addClient'})">+ Nuovo</button></div><div class="stats-grid"><div class="stat"><div class="lbl">Clienti</div><div class="val val-gold">${all.length}</div></div><div class="stat"><div class="lbl">Debiti totali</div><div class="val val-red">${fmt(totD)}</div></div><div class="stat"><div class="lbl">Crediti totali</div><div class="val val-green">${fmt(totC)}</div></div></div><div class="client-list">${fil.length===0?`<div class="empty"><div class="ico">👥</div><p>${APP.search?'Nessun risultato':'Nessun cliente ancora'}</p></div>`:fil.map(c=>{const sal=getSaldo(c);const cls=sal>0?'bal-pos':sal<0?'bal-neg':'bal-zero';const lbl=sal>0?'deve a te':sal<0?'in credito':'pari';const segs=(APP.DB.segnalazioni||[]).filter(s=>s.clientId===c.id&&s.stato==='pending').length;return`<div class="client-row" onclick="openClient('${c.id}')"><div class="avatar">${c.name[0].toUpperCase()}</div><div class="client-info"><div class="client-name">${esc(c.name)}${segs>0?`<span style="margin-left:8px;background:rgba(232,197,71,0.15);color:var(--accent);font-size:.62rem;padding:1px 6px;border-radius:8px;font-weight:700">${segs}</span>`:''}</div><div class="client-meta">${c.movimenti.length} mov.${c.phone?' · '+esc(c.phone):''}</div></div><div class="client-bal ${cls}"><div class="bal-amt">${fmt(sal)}</div><div class="bal-lbl">${lbl}</div></div></div>`;}).join('')}</div>`;}
function renderDetail(id){const c=getClient(id);if(!c)return'<p>Cliente non trovato</p>';const sal=getSaldo(c);const salColor=sal>0?'var(--red)':sal<0?'var(--green)':'var(--text3)';const lbl=sal>0?'Deve a te':sal<0?'In tuo credito':'Pari';const movs=[...(c.movimenti||[])].sort((a,b)=>new Date(a.data)-new Date(b.data));const run=getRunning(movs);const segs=(APP.DB.segnalazioni||[]).filter(s=>s.clientId===id&&s.stato==='pending');const vl=vlink(id);const icons={acquisto:'🛍️',acconto:'💸',pagamento:'✅',merce:'📦'};return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px"><button class="back-btn" onclick="goHome()">← Clienti</button><div style="display:flex;gap:6px"><button class="btn btn-outline btn-sm" onclick="showModal({type:'editClient',id:'${id}'})">✏️</button><button class="btn-ghost" onclick="confirmDel('${id}')">🗑</button></div></div><div class="client-hero"><div class="hero-top"><div class="hero-left"><div class="avatar-lg">${c.name[0].toUpperCase()}</div><div><div class="hero-name">${esc(c.name)}</div><div class="hero-sub">${c.phone?'📞 '+esc(c.phone):''}${c.note?' · '+esc(c.note):''}</div></div></div><div class="saldo-block"><div class="saldo-lbl">${lbl}</div><div class="saldo-val" style="color:${salColor}">${fmt(sal)}</div></div></div></div><div class="action-row"><button class="btn btn-red btn-sm" onclick="showModal({type:'addMov',clientId:'${id}',tipo:'acquisto'})">+ Acquisto</button><button class="btn btn-green btn-sm" onclick="showModal({type:'addMov',clientId:'${id}',tipo:'acconto'})">+ Acconto</button><button class="btn btn-green btn-sm" onclick="showModal({type:'addMov',clientId:'${id}',tipo:'pagamento'})">+ Pagamento</button><button class="btn btn-outline btn-sm" onclick="showModal({type:'addMov',clientId:'${id}',tipo:'merce'})">+ Merce</button></div>${segs.length>0?`<div class="seg-panel"><h3>⏳ Segnalazioni (${segs.length})</h3>${segs.map(s=>`<div class="seg-item"><div class="seg-desc">${esc(s.descrizione)} — ${fmt(s.importo)} <span class="tag tag-${s.tipo==='acquisto'||s.tipo==='merce'?'acq':'acc'}">${s.tipo}</span></div><div class="seg-meta">${fmtD(s.data)}${s.note?' · '+esc(s.note):''}</div><div class="seg-actions"><button class="btn btn-green btn-xs" onclick="appSeg('${s.id}')">✓ Approva</button><button class="btn btn-red btn-xs" onclick="rifSeg('${s.id}')">✗ Rifiuta</button></div></div>`).join('')}</div>`:''}<div class="share-box"><div><p>🔗 Link vista cliente</p><div class="share-link">${vl}</div></div><button class="btn btn-outline btn-sm" onclick="copyText('${esc(vl)}')">Copia</button></div><div class="mov-head"><h3>Movimenti (${movs.length})</h3></div><div class="mov-list">${movs.length===0?`<div class="empty"><div class="ico">📋</div><p>Nessun movimento</p></div>`:movs.map((m,i)=>{const isPos=m.tipo==='acquisto'||m.tipo==='merce';const tCls=m.tipo==='acconto'||m.tipo==='pagamento'?'acc':'acq';return`<div class="mov-item"><div class="mov-ico ico-${m.tipo==='acconto'?'acc':m.tipo==='pagamento'?'pag':m.tipo==='merce'?'mer':'acq'}">${icons[m.tipo]||'•'}</div><div class="mov-body"><div class="mov-desc">${esc(m.descrizione)}<span class="tag tag-${tCls}">${m.tipo}</span></div><div class="mov-meta">${fmtD(m.data)}</div>${m.note?`<div class="mov-note">${esc(m.note)}</div>`:''}</div><div class="mov-right"><div class="mov-amt ${isPos?'pos':'neg'}">${isPos?'+':'-'}${fmt(m.importo)}</div><div class="mov-run">saldo: ${fmt(run[i])}</div></div><button class="btn-ghost" style="font-size:.85rem" onclick="confirmDelMov('${id}','${m.id}')">🗑</button></div>`;}).join('')}</div>`;}
function renderViewer(id){setTimeout(async()=>{if(NPOINT_ID){try{const r=await fetch(`${NPOINT_BASE}/${NPOINT_ID}`);if(r.ok){const d=await r.json();APP.DB=d;lsSave(APP.DB);}}catch{}}else{APP.DB=lsLoad();}document.getElementById('root').innerHTML=renderViewerContent(id);},100);return`<div class="loading"><div class="spinner"></div> Caricamento…</div>`;}
function renderViewerContent(id){const c=getClient(id);if(!c)return`<div class="wrap" style="padding:40px 16px;text-align:center"><p style="color:var(--text3)">Scheda non trovata.</p></div>`;const sal=getSaldo(c);const salColor=sal>0?'var(--red)':sal<0?'var(--green)':'var(--text3)';const lbl=sal>0?'Devi al negozio':sal<0?'Il negozio ti deve':'Siete pari';const movs=[...(c.movimenti||[])].sort((a,b)=>new Date(a.data)-new Date(b.data));const run=getRunning(movs);const icons={acquisto:'🛍️',acconto:'💸',pagamento:'✅',merce:'📦'};return`<div class="topbar"><div class="wrap"><div class="topbar-inner"><div class="logo"><div class="logo-mark">📒</div><div><h1>LibroDare</h1><span>Scheda cliente</span></div></div><span class="badge badge-view">👁 Sola lettura</span></div></div></div><div class="wrap" style="padding-top:20px;padding-bottom:60px"><div class="viewer-hero"><div style="font-size:1.5rem">👋</div><div><h3>Ciao, ${esc(c.name)}!</h3><p>Scheda in sola lettura · Usa il modulo per segnalare errori</p></div></div><div class="client-hero"><div class="hero-top"><div class="hero-left"><div class="avatar-lg">${c.name[0].toUpperCase()}</div><div><div class="hero-name">${esc(c.name)}</div>${c.phone?`<div class="hero-sub">📞 ${esc(c.phone)}</div>`:''}</div></div><div class="saldo-block"><div class="saldo-lbl">${lbl}</div><div class="saldo-val" style="color:${salColor}">${fmt(sal)}</div></div></div></div><div class="segnala-box"><h3>📣 Segnala un movimento</h3><p style="font-size:.8rem;color:var(--text3);margin-bottom:12px">Qualcosa non torna? Il titolare riceverà la segnalazione e la approverà.</p><div class="form-row"><div class="form-group"><label>Tipo</label><select id="seg-tipo"><option value="acquisto">🛍️ Acquisto mancante</option><option value="acconto">💸 Acconto non registrato</option><option value="pagamento">✅ Pagamento non registrato</option><option value="merce">📦 Merce ricevuta</option></select></div><div class="form-group"><label>Importo €</label><input id="seg-imp" type="number" min="0" step="0.01" placeholder="0.00"></div></div><div class="form-row"><div class="form-group"><label>Data</label><input id="seg-data" type="date" value="${today()}"></div><div class="form-group"><label>Descrizione</label><input id="seg-desc" type="text" placeholder="Es. Acconto del 10 marzo"></div></div><div class="form-group"><label>Note</label><textarea id="seg-note" placeholder="Dettagli opzionali…" style="min-height:54px"></textarea></div><button class="btn btn-gold" style="width:100%;justify-content:center" onclick="inviaSegn('${id}','${esc(c.name)}')">📤 Invia segnalazione</button></div><div class="mov-head"><h3>I tuoi movimenti (${movs.length})</h3></div><div class="mov-list">${movs.length===0?`<div class="empty"><div class="ico">📋</div><p>Nessun movimento</p></div>`:movs.map((m,i)=>{const isPos=m.tipo==='acquisto'||m.tipo==='merce';const tCls=m.tipo==='acconto'||m.tipo==='pagamento'?'acc':'acq';return`<div class="mov-item"><div class="mov-ico ico-${m.tipo==='acconto'?'acc':m.tipo==='pagamento'?'pag':m.tipo==='merce'?'mer':'acq'}">${icons[m.tipo]||'•'}</div><div class="mov-body"><div class="mov-desc">${esc(m.descrizione)}<span class="tag tag-${tCls}">${m.tipo}</span></div><div class="mov-meta">${fmtD(m.data)}</div>${m.note?`<div class="mov-note">${esc(m.note)}</div>`:''}</div><div class="mov-right"><div class="mov-amt ${isPos?'pos':'neg'}">${isPos?'+':'-'}${fmt(m.importo)}</div><div class="mov-run">saldo: ${fmt(run[i])}</div></div></div>`;}).join('')}</div></div>`;}
function renderNotifPanel(){const segs=getPending();return`<div class="notif-panel"><div class="notif-header"><h4>🔔 Segnalazioni (${segs.length})</h4><button class="btn-ghost" onclick="APP.showNotif=false;render()">✕</button></div>${segs.length===0?`<div class="empty" style="padding:20px"><p>Nessuna</p></div>`:segs.map(s=>`<div class="notif-item unread" onclick="openClient('${s.clientId}');APP.showNotif=false;"><div class="notif-title">${esc(s.clientName)} — ${fmt(s.importo)}</div><div class="notif-sub">${esc(s.descrizione)} · ${fmtD(s.createdAt)}</div></div>`).join('')}</div>`;}
function renderModal(){const m=APP.modal;if(!m)return'';let body='';if(m.type==='addClient'){body=`<h2>👤 Nuovo Cliente</h2><div class="form-group"><label>Nome *</label><input id="m-name" type="text" placeholder="Es. Mario Rossi"></div><div class="form-row"><div class="form-group"><label>Telefono</label><input id="m-phone" type="tel" placeholder="333 1234567"></div><div class="form-group"><label>Note</label><input id="m-note" type="text" placeholder="Facoltativo"></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Annulla</button><button class="btn btn-gold" onclick="submitAddClient()">Salva</button></div>`;}else if(m.type==='editClient'){const c=getClient(m.id);body=`<h2>✏️ Modifica</h2><div class="form-group"><label>Nome *</label><input id="m-name" type="text" value="${esc(c?.name||'')}"></div><div class="form-row"><div class="form-group"><label>Telefono</label><input id="m-phone" type="tel" value="${esc(c?.phone||'')}"></div><div class="form-group"><label>Note</label><input id="m-note" type="text" value="${esc(c?.note||'')}"></div></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Annulla</button><button class="btn btn-gold" onclick="submitEdit('${m.id}')">Salva</button></div>`;}else if(m.type==='addMov'){const labels={acquisto:'🛍️ Acquisto',acconto:'💸 Acconto',pagamento:'✅ Pagamento',merce:'📦 Merce da te'};body=`<h2>${labels[m.tipo]}</h2><div class="form-row"><div class="form-group"><label>Data *</label><input id="m-data" type="date" value="${today()}"></div><div class="form-group"><label>Importo € *</label><input id="m-imp" type="number" min="0.01" step="0.01" placeholder="0.00"></div></div><div class="form-group"><label>Descrizione *</label><input id="m-desc" type="text" placeholder="${m.tipo==='acquisto'?'Es. Scarpe Nike':m.tipo==='merce'?'Es. Borsa consegnata':'Es. Acconto contanti'}"></div><div class="form-group"><label>Tipo</label><select id="m-tipo"><option value="acquisto" ${m.tipo==='acquisto'?'selected':''}>🛍️ Acquisto (deve a te)</option><option value="acconto" ${m.tipo==='acconto'?'selected':''}>💸 Acconto (scala debito)</option><option value="pagamento" ${m.tipo==='pagamento'?'selected':''}>✅ Pagamento completo</option><option value="merce" ${m.tipo==='merce'?'selected':''}>📦 Merce da te</option></select></div><div class="form-group"><label>Note</label><textarea id="m-note" placeholder="Facoltativo…"></textarea></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Annulla</button><button class="btn btn-gold" onclick="submitMov('${m.clientId}')">Aggiungi</button></div>`;}else if(m.type==='confirm'){body=`<h2>⚠️ Conferma</h2><p style="font-size:.88rem;color:var(--text2);line-height:1.6">${m.text}</p><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Annulla</button><button class="btn btn-red" onclick="(${m.cb})()">Elimina</button></div>`;}else if(m.type==='changePin'){body=`<h2>🔐 Cambia PIN</h2><div class="form-group"><label>PIN attuale</label><input id="m-old" type="password" maxlength="6"></div><div class="form-group"><label>Nuovo PIN</label><input id="m-new" type="password" maxlength="6"></div><div class="form-group"><label>Conferma</label><input id="m-new2" type="password" maxlength="6"></div><div id="pin-err" style="color:var(--red);font-size:.8rem;min-height:16px"></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Annulla</button><button class="btn btn-gold" onclick="submitPin()">Salva</button></div>`;}else if(m.type==='segnalazioni'){const segs=getPending();body=`<h2>⏳ Segnalazioni</h2>${segs.length===0?'<p style="color:var(--text3);font-size:.88rem">Nessuna</p>':segs.map(s=>`<div class="seg-item" style="margin-bottom:10px"><div class="seg-desc"><strong>${esc(s.clientName)}</strong> — ${esc(s.descrizione)} — ${fmt(s.importo)} <span class="tag tag-${s.tipo==='acquisto'||s.tipo==='merce'?'acq':'acc'}">${s.tipo}</span></div><div class="seg-meta">${fmtD(s.data)}${s.note?' · '+esc(s.note):''}</div><div class="seg-actions"><button class="btn btn-green btn-xs" onclick="appSeg('${s.id}')">✓ Approva</button><button class="btn btn-red btn-xs" onclick="rifSeg('${s.id}')">✗ Rifiuta</button></div></div>`).join('')}<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Chiudi</button></div>`;}return`<div class="overlay" onclick="overlayClose(event)"><div class="modal"><div class="modal-handle"></div>${body}</div></div>`;}
function pinKey(k){if(k==='del'){APP.pinInput=APP.pinInput.slice(0,-1);APP.pinError='';render();return;}if(APP.pinInput.length>=6)return;APP.pinInput+=k;if(APP.pinInput.length>=(APP.DB.pin.length)){if(APP.pinInput===APP.DB.pin){APP.mode='admin';APP.pinInput='';APP.pinError='';jbLoad().then(()=>render());}else{APP.pinError='PIN errato';setTimeout(()=>{APP.pinInput='';APP.pinError='';render();},800);}render();return;}render();}
function logout(){APP.mode=null;APP.pinInput='';location.hash='';render();}
function goHome(){APP.page='dashboard';APP.clientId=null;location.hash='';render();}
function openClient(id){APP.page='client';APP.clientId=id;location.hash='#/c/'+id;render();}
function closeModal(){APP.modal=null;render();}
function overlayClose(e){if(e.target.classList.contains('overlay'))closeModal();}
function showModal(m){APP.modal=m;render();}
function toggleNotif(){APP.showNotif=!APP.showNotif;render();}
function renderContent(){render();}
function submitAddClient(){const n=document.getElementById('m-name').value.trim();if(!n){showToast('Inserisci il nome!');return;}addClient(n,document.getElementById('m-phone').value.trim(),document.getElementById('m-note').value.trim());closeModal();showToast('✅ Cliente aggiunto!');}
function submitEdit(id){const n=document.getElementById('m-name').value.trim();if(!n){showToast('Inserisci il nome!');return;}editClient(id,n,document.getElementById('m-phone').value.trim(),document.getElementById('m-note').value.trim());closeModal();showToast('✅ Salvato!');}
function submitMov(cid){const tipo=document.getElementById('m-tipo').value;const imp=document.getElementById('m-imp').value;const desc=document.getElementById('m-desc').value.trim();const data=document.getElementById('m-data').value;const note=document.getElementById('m-note').value.trim();if(!imp||!desc||!data){showToast('Compila tutti i campi!');return;}addMov(cid,tipo,imp,desc,data,note);closeModal();showToast('✅ Movimento aggiunto!');}
function submitPin(){const old=document.getElementById('m-old').value;const np=document.getElementById('m-new').value;const np2=document.getElementById('m-new2').value;const err=document.getElementById('pin-err');if(old!==APP.DB.pin){err.textContent='PIN attuale errato';return;}if(np.length<4){err.textContent='Minimo 4 cifre';return;}if(np!==np2){err.textContent='I PIN non coincidono';return;}APP.DB.pin=np;saveDB();closeModal();showToast('✅ PIN cambiato!');}
function confirmDel(id){const c=getClient(id);showModal({type:'confirm',text:`Eliminare <strong>${esc(c?.name)}</strong> e tutti i movimenti?`,cb:`function(){deleteClient('${id}');APP.page='dashboard';APP.clientId=null;location.hash='';closeModal();render();showToast('Eliminato');}`});}
function confirmDelMov(cid,mid){showModal({type:'confirm',text:'Eliminare questo movimento?',cb:`function(){delMov('${cid}','${mid}');closeModal();render();showToast('Eliminato');}`});}
function appSeg(id){approvaSeg(id);render();showToast('✅ Approvato!');}
function rifSeg(id){rifiutaSeg(id);render();showToast('Rifiutato');}
function inviaSegn(cid,cname){const tipo=document.getElementById('seg-tipo').value;const imp=document.getElementById('seg-imp').value;const desc=document.getElementById('seg-desc').value.trim();const data=document.getElementById('seg-data').value;const note=document.getElementById('seg-note').value.trim();if(!imp||!desc){showToast('Compila importo e descrizione!');return;}addSeg(cid,cname,tipo,desc,imp,data,note);showToast('✅ Segnalazione inviata!');document.getElementById('seg-imp').value='';document.getElementById('seg-desc').value='';document.getElementById('seg-note').value='';}
function copyText(t){navigator.clipboard.writeText(t).then(()=>showToast('📋 Link copiato!')).catch(()=>showToast('Copia manualmente'));}
function showToast(msg){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600);}
APP.DB=lsLoad();
initRoute();
render();
</script>
</body>
</html>
