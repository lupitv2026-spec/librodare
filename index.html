<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LibroDare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#22223a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0eee8;--text2:#9896a4;--text3:#5c5a6a;
  --gold:#e8c547;--gold-dim:rgba(232,197,71,0.12);--gold-glow:rgba(232,197,71,0.25);
  --red:#f06449;--red-dim:rgba(240,100,73,0.12);
  --green:#4ecb8d;--green-dim:rgba(78,203,141,0.12);
  --blue:#6b8cff;--blue-dim:rgba(107,140,255,0.12);
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;overscroll-behavior:none;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.wrap{max-width:800px;margin:0 auto;padding:0 16px;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:13px 0;}
.tb{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#f0a832);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 0 16px var(--gold-glow);}
.logo h1{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text);}
.logo span{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;display:block;}
.tb-right{display:flex;align-items:center;gap:7px;}
.sync{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--text3);}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sdot.ok{background:var(--green);box-shadow:0 0 6px rgba(78,203,141,0.5);}
.sdot.spin{background:var(--gold);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.badge{padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.b-admin{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(232,197,71,0.2);}
.b-view{background:var(--green-dim);color:var(--green);border:1px solid rgba(78,203,141,0.2);}
.nb{position:relative;width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
.nb-dot{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;width:14px;height:14px;border-radius:50%;font-size:.55rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
.ib{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-family:'Inter',sans-serif;font-weight:600;}
.ib:hover{background:var(--surface);}
.gb{background:transparent;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:.8rem;cursor:pointer;padding:3px 6px;}
.gb:hover{color:var(--text);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:.86rem;font-weight:600;transition:all .15s;white-space:nowrap;}
.btn:active{transform:scale(0.97);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#f0a832);color:#0a0a0f;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 18px var(--gold-glow);}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(240,100,73,0.2);}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(78,203,141,0.2);}
.btn-out{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-out:hover{background:var(--surface);}
.btn-ghost{background:transparent;border:none;color:var(--text3);font-family:'Inter',sans-serif;font-size:.8rem;cursor:pointer;padding:3px 7px;}
.btn-ghost:hover{color:var(--text);}
.btn-sm{padding:7px 13px;font-size:.79rem;border-radius:8px;}
.btn-xs{padding:4px 9px;font-size:.73rem;border-radius:7px;}

/* PIN */
.pin-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;background:radial-gradient(ellipse at 50% 10%,rgba(232,197,71,0.07) 0%,transparent 65%);}
.pin-card{background:var(--surface);border-radius:24px;padding:36px 28px;max-width:310px;width:100%;border:1px solid var(--border2);box-shadow:0 12px 48px rgba(0,0,0,0.6);text-align:center;}
.pin-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--gold),#f0a832);border-radius:16px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 28px var(--gold-glow);}
.pin-card h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:4px;}
.pin-card p{font-size:.82rem;color:var(--text3);margin-bottom:28px;}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:24px;}
.pd{width:11px;height:11px;border-radius:50%;border:2px solid var(--border2);transition:all .15s;}
.pd.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px var(--gold-glow);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pk{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:1.2rem;font-weight:600;cursor:pointer;font-family:'Playfair Display',serif;transition:all .12s;color:var(--text);}
.pk:hover{background:var(--surface3);}
.pk:active{transform:scale(0.93);}
.pk.del{font-size:.83rem;color:var(--red);font-family:'Inter',sans-serif;}
.pin-err{color:var(--red);font-size:.78rem;margin-top:10px;min-height:16px;}

/* FORM */
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;border:1px solid var(--border2);border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:.89rem;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(232,197,71,0.4);}
.fg textarea{resize:vertical;min-height:68px;}
.fg select{cursor:pointer;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:fi .18s ease;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:22px 18px 40px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;border:1px solid var(--border2);border-bottom:none;animation:su .2s ease;}
@keyframes su{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
.modal h2{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:16px;}
.ma{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;}
@media(min-width:600px){.overlay{align-items:center;}.modal{border-radius:24px;max-height:88vh;}}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0 20px;}
.stat{background:var(--surface);border-radius:var(--r);padding:15px;border:1px solid var(--border);}
.stat .l{font-size:.67rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.stat .v{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:600;}
.vg{color:var(--gold);}
.vr{color:var(--red);}
.vgr{color:var(--green);}

/* SEARCH */
.dh{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.dh h2{font-family:'Playfair Display',serif;font-size:1.4rem;}
.sw{position:relative;flex:1;min-width:150px;max-width:250px;}
.sw input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:.85rem;background:var(--surface);color:var(--text);outline:none;}
.sw input::placeholder{color:var(--text3);}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none;}

/* CLIENT LIST */
.cl{display:grid;gap:8px;}
.cr{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .16s;}
.cr:hover{border-color:var(--border2);background:var(--surface2);transform:translateX(2px);}
.av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--surface3),var(--surface2));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.1rem;flex-shrink:0;}
.ci{flex:1;min-width:0;}
.cn{font-weight:600;font-size:.94rem;}
.cm{font-size:.72rem;color:var(--text3);margin-top:2px;}
.cb{text-align:right;flex-shrink:0;}
.ba{font-family:'Playfair Display',serif;font-size:1.05rem;}
.bl{font-size:.63rem;text-transform:uppercase;letter-spacing:.5px;margin-top:1px;font-weight:600;}
.rp .ba,.rp .bl{color:var(--red);}
.gp .ba,.gp .bl{color:var(--green);}
.zp .ba,.zp .bl{color:var(--text3);}

/* DETAIL */
.bk{display:inline-flex;align-items:center;gap:5px;color:var(--text3);font-size:.83rem;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;margin-bottom:15px;padding:0;}
.bk:hover{color:var(--text);}
.hero{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:18px;margin-bottom:11px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(232,197,71,0.07),transparent);}
.ht{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.hl{display:flex;align-items:center;gap:13px;}
.avl{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--surface3),var(--surface2));border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.35rem;flex-shrink:0;}
.hn{font-family:'Playfair Display',serif;font-size:1.25rem;}
.hs{font-size:.76rem;color:var(--text3);margin-top:2px;}
.sb{text-align:right;}
.sl{font-size:.63rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.sv{font-family:'Playfair Display',serif;font-size:1.75rem;line-height:1.1;}
.ar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px;}

/* SHARE */
.shb{background:var(--blue-dim);border:1px solid rgba(107,140,255,0.2);border-radius:var(--rs);padding:11px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:11px;}
.shb p{font-size:.78rem;color:var(--blue);font-weight:600;}
.shl{font-size:.7rem;color:var(--text3);word-break:break-all;margin-top:2px;}

/* MOV */
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.mhead h3{font-family:'Playfair Display',serif;font-size:.98rem;}
.mlist{display:grid;gap:6px;}
.mi{background:var(--surface);border-radius:var(--rs);border:1px solid var(--border);padding:11px 13px;display:flex;align-items:center;gap:10px;}
.mico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0;}
.iD{background:var(--red-dim);}
.iA{background:var(--green-dim);}
.mb{flex:1;min-width:0;}
.md{font-size:.85rem;font-weight:500;}
.mm{font-size:.7rem;color:var(--text3);margin-top:2px;}
.mn{font-size:.69rem;color:var(--text3);font-style:italic;margin-top:1px;}
.mr{text-align:right;flex-shrink:0;}
.ma2{font-family:'Playfair Display',serif;font-size:.96rem;}
.ma2.D{color:var(--red);}
.ma2.A{color:var(--green);}
.mr2{font-size:.67rem;color:var(--text3);margin-top:1px;}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.63rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-left:5px;}
.tD{background:var(--red-dim);color:var(--red);}
.tA{background:var(--green-dim);color:var(--green);}

/* SEG */
.segp{background:rgba(232,197,71,0.05);border:1px solid rgba(232,197,71,0.15);border-radius:var(--r);padding:14px;margin-bottom:11px;}
.segp h3{font-family:'Playfair Display',serif;font-size:.93rem;color:var(--gold);margin-bottom:11px;}
.segi{background:var(--surface2);border-radius:var(--rs);padding:11px 13px;border:1px solid var(--border);margin-bottom:7px;}
.segi:last-child{margin-bottom:0;}
.segd{font-size:.84rem;font-weight:500;}
.segm{font-size:.71rem;color:var(--text3);margin-top:3px;}
.sega{display:flex;gap:6px;margin-top:9px;}

/* VIEWER */
.vhero{background:linear-gradient(135deg,rgba(78,203,141,0.1),rgba(78,203,141,0.03));border:1px solid rgba(78,203,141,0.2);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:11px;}
.vhero h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--green);}
.vhero p{font-size:.76rem;color:var(--text3);margin-top:2px;}
.segbox{background:var(--blue-dim);border:1px solid rgba(107,140,255,0.2);border-radius:var(--r);padding:14px;margin-bottom:13px;}
.segbox h3{font-family:'Playfair Display',serif;font-size:.93rem;color:var(--blue);margin-bottom:8px;}

/* NOTIF */
.np{position:fixed;top:60px;right:14px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border2);box-shadow:0 12px 40px rgba(0,0,0,0.6);width:290px;max-height:360px;overflow-y:auto;z-index:150;animation:su .18s ease;}
.nph{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);}
.nph h4{font-family:'Playfair Display',serif;font-size:.93rem;}
.npi{padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.npi:hover{background:var(--surface2);}
.npi:last-child{border-bottom:none;}
.npi.u{background:rgba(232,197,71,0.04);}
.npt{font-size:.82rem;font-weight:600;}
.nps{font-size:.72rem;color:var(--text3);margin-top:2px;}

/* ALERT */
.alb{background:rgba(232,197,71,0.08);border:1px solid rgba(232,197,71,0.2);border-radius:var(--rs);padding:10px 13px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:9px;flex-wrap:wrap;}
.alb p{font-size:.82rem;color:var(--gold);font-weight:500;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:36px 20px;color:var(--text3);}
.empty .ico{font-size:1.8rem;margin-bottom:9px;opacity:.45;}
.empty p{font-size:.84rem;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--text3);font-size:.84rem;}
.spin{width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:9px 18px;border-radius:28px;font-size:.83rem;font-weight:500;z-index:999;white-space:nowrap;border:1px solid var(--border2);box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:tIn .2s ease,tOut .2s ease 2.3s forwards;}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(7px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tOut{to{opacity:0}}

@media(max-width:520px){.stats{grid-template-columns:1fr 1fr;}.stats>*:last-child{grid-column:span 2;}.fr{grid-template-columns:1fr;}.ar .btn-sm{padding:7px 9px;font-size:.75rem;}}
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FB_CONFIG = {
  apiKey: "AIzaSyB5gf1QbAAJk3FJG0rONUHIDQVjEd4HNLM",
  authDomain: "librodare-3e888.firebaseapp.com",
  databaseURL: "https://librodare-3e888-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "librodare-3e888",
  storageBucket: "librodare-3e888.firebasestorage.app",
  messagingSenderId: "445220851534",
  appId: "1:445220851534:web:0f2670b019a69735e1d81f"
};

const fbApp = initializeApp(FB_CONFIG);
const db = getDatabase(fbApp);
window._fbReady = true;

// SAVE
window.fbSave = async function(data) {
  try {
    await set(ref(db, 'librodare'), data);
    return true;
  } catch(e) { console.error(e); return false; }
};

// LOAD
window.fbLoad = async function() {
  try {
    const snap = await get(ref(db, 'librodare'));
    if (snap.exists()) return snap.val();
    return null;
  } catch(e) { console.error(e); return null; }
};

// LISTEN realtime
window.fbListen = function(cb) {
  onValue(ref(db, 'librodare'), snap => {
    if (snap.exists()) cb(snap.val());
  });
};

// Init app after firebase ready
window.dispatchEvent(new Event('fbReady'));
</script>

<script>
const OWNER = 'Odoardo';
const LS = 'ld_v4';

let APP = {
  mode: null,
  page: 'dashboard',
  clientId: null,
  search: '',
  modal: null,
  showNotif: false,
  syncing: false,
  syncOk: false,
  DB: { clients:[], pin:'1234', segnalazioni:[] },
  pinInput: '',
  pinError: '',
};

// ── ROUTING ──
function parseRoute() {
  const h = location.hash;
  if (h.startsWith('#/v/')) return { type:'viewer', id:h.slice(4) };
  if (h.startsWith('#/c/')) return { type:'client', id:h.slice(4) };
  return { type:'dashboard' };
}
window.addEventListener('hashchange', () => { initRoute(); render(); });
function initRoute() {
  const r = parseRoute();
  if (r.type==='viewer') { APP.mode='viewer'; APP.clientId=r.id; APP.page='client'; }
  else if (r.type==='client' && APP.mode==='admin') { APP.page='client'; APP.clientId=r.id; }
  else if (r.type==='dashboard') { APP.page='dashboard'; APP.clientId=null; }
}

// ── STORAGE ──
function lsLoad() { try{return JSON.parse(localStorage.getItem(LS))||{clients:[],pin:'1234',segnalazioni:[]};}catch{return{clients:[],pin:'1234',segnalazioni:[]};} }
function lsSave(db) { localStorage.setItem(LS, JSON.stringify(db)); }

async function saveDB() {
  lsSave(APP.DB);
  APP.syncing = true; rSD();
  const ok = await window.fbSave(APP.DB);
  APP.syncing = false; APP.syncOk = ok; rSD();
}

async function loadDB() {
  APP.syncing = true; rSD();
  const data = await window.fbLoad();
  if (data) { APP.DB = data; lsSave(data); }
  else { APP.DB = lsLoad(); }
  APP.syncing = false; APP.syncOk = !!data; rSD();
}

function rSD() {
  const el = document.getElementById('syncDot');
  if (!el) return;
  if (APP.syncing) el.innerHTML = '<span class="sdot spin"></span>Sinc…';
  else if (APP.syncOk) el.innerHTML = '<span class="sdot ok"></span>Online';
  else el.innerHTML = '<span class="sdot"></span>Locale';
}

// ── DB HELPERS ──
function getClient(id) { return (APP.DB.clients||[]).find(c=>c.id===id); }
function getPending() { return (APP.DB.segnalazioni||[]).filter(s=>s.stato==='pending'); }
function getSaldo(c) {
  return (c.movimenti||[]).reduce((s,m) => m.tipo==='D' ? s+m.importo : s-m.importo, 0);
}
function getRunning(movs) {
  let s=0;
  return movs.map(m => { if(m.tipo==='D') s+=m.importo; else s-=m.importo; return s; });
}
function addClient(n,p,no) {
  const c={id:Date.now().toString(),name:n,phone:p,note:no,createdAt:new Date().toISOString(),movimenti:[]};
  APP.DB.clients.push(c); saveDB(); return c;
}
function editClient(id,n,p,no) {
  const c=getClient(id); if(!c) return;
  c.name=n; c.phone=p; c.note=no; saveDB();
}
function deleteClient(id) {
  APP.DB.clients=APP.DB.clients.filter(c=>c.id!==id);
  APP.DB.segnalazioni=(APP.DB.segnalazioni||[]).filter(s=>s.clientId!==id);
  saveDB();
}
function addMov(cid,tipo,imp,note,data) {
  const c=getClient(cid); if(!c) return;
  const m={id:Date.now().toString(),tipo,importo:parseFloat(imp),note,data,createdAt:new Date().toISOString()};
  c.movimenti.push(m); saveDB(); return m;
}
function delMov(cid,mid) {
  const c=getClient(cid); if(!c) return;
  c.movimenti=c.movimenti.filter(m=>m.id!==mid); saveDB();
}
function addSeg(cid,cname,tipo,note,imp,data) {
  if(!APP.DB.segnalazioni) APP.DB.segnalazioni=[];
  const s={id:Date.now().toString(),clientId:cid,clientName:cname,tipo,note,importo:parseFloat(imp)||0,data,stato:'pending',createdAt:new Date().toISOString()};
  APP.DB.segnalazioni.push(s); saveDB(); return s;
}
function approvaSeg(id) {
  const s=(APP.DB.segnalazioni||[]).find(x=>x.id===id); if(!s) return;
  addMov(s.clientId, s.tipo, s.importo, s.note||'Da segnalazione cliente', s.data);
  s.stato='approved'; saveDB();
}
function rifiutaSeg(id) {
  const s=(APP.DB.segnalazioni||[]).find(x=>x.id===id); if(!s) return;
  s.stato='rejected'; saveDB();
}

// ── UTILS ──
function fmt(n) { return '€'+Math.abs(parseFloat(n)||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtD(d) { try{return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});}catch{return d||'';} }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() { return new Date().toISOString().split('T')[0]; }
function vlink(id) { return location.origin+location.pathname+'#/v/'+id; }

// ── RENDER ──
function render() {
  const root = document.getElementById('root');
  const r = parseRoute();

  if (r.type==='viewer') {
    APP.mode='viewer';
    root.innerHTML = `<div class="loading"><div class="spin"></div> Caricamento…</div>`;
    loadViewerData(r.id).then(() => { root.innerHTML = renderViewerContent(r.id); });
    return;
  }
  if (!APP.mode) { root.innerHTML = renderPin(); return; }

  let content = APP.page==='client' && APP.clientId ? renderDetail(APP.clientId) : renderDash();
  root.innerHTML = `${renderTopbar()}<div class="wrap" style="padding-top:18px;padding-bottom:60px">${content}</div>${APP.modal?renderModal():''}${APP.showNotif?renderNotif():''}`;
}

// ── ACTIONS ──
function pinKey(k) {
  if(k==='del'){APP.pinInput=APP.pinInput.slice(0,-1);APP.pinError='';render();return;}
  if(APP.pinInput.length>=6) return;
  APP.pinInput+=k;
  if(APP.pinInput.length>=APP.DB.pin.length){
    if(APP.pinInput===APP.DB.pin){
      APP.mode='admin';APP.pinInput='';APP.pinError='';
      loadDB().then(()=>render());
    } else {
      APP.pinError='PIN errato';
      setTimeout(()=>{APP.pinInput='';APP.pinError='';render();},800);
    }
    render();return;
  }
  render();
}
function logout(){APP.mode=null;APP.pinInput='';location.hash='';render();}
function goHome(){APP.page='dashboard';APP.clientId=null;location.hash='';render();}
function openClient(id){APP.page='client';APP.clientId=id;location.hash='#/c/'+id;render();}
function closeModal(){APP.modal=null;render();}
function overlayClose(e){if(e.target.classList.contains('overlay'))closeModal();}
function showModal(m){APP.modal=m;render();}
function toggleNotif(){APP.showNotif=!APP.showNotif;render();}
function renderContent(){render();}

function submitAddClient(){
  const n=document.getElementById('m-name').value.trim();
  if(!n){showToast('Inserisci il nome!');return;}
  addClient(n,document.getElementById('m-phone').value.trim(),document.getElementById('m-note').value.trim());
  closeModal();showToast('✅ Cliente aggiunto!');
}
function submitEdit(id){
  const n=document.getElementById('m-name').value.trim();
  if(!n){showToast('Inserisci il nome!');return;}
  editClient(id,n,document.getElementById('m-phone').value.trim(),document.getElementById('m-note').value.trim());
  closeModal();showToast('✅ Salvato!');
}
function submitMov(cid,tipo){
  const imp=document.getElementById('m-imp').value;
  const note=document.getElementById('m-note').value.trim();
  const data=document.getElementById('m-data').value;
  if(!imp||!note||!data){showToast('Compila tutti i campi!');return;}
  addMov(cid,tipo,imp,note,data);
  closeModal();showToast('✅ Movimento aggiunto!');
}
function submitPin(){
  const old=document.getElementById('m-old').value;
  const np=document.getElementById('m-new').value;
  const np2=document.getElementById('m-new2').value;
  const err=document.getElementById('pin-err');
  if(old!==APP.DB.pin){err.textContent='PIN attuale errato';return;}
  if(np.length<4){err.textContent='Minimo 4 cifre';return;}
  if(np!==np2){err.textContent='I PIN non coincidono';return;}
  APP.DB.pin=np;saveDB();closeModal();showToast('✅ PIN cambiato!');
}
function confirmDel(id){
  const c=getClient(id);
  showModal({type:'confirm',text:`Eliminare <strong>${esc(c?.name)}</strong> e tutti i movimenti?`,cb:`function(){deleteClient('${id}');APP.page='dashboard';APP.clientId=null;location.hash='';closeModal();render();showToast('Eliminato');}`});
}
function confirmDelMov(cid,mid){
  showModal({type:'confirm',text:'Eliminare questo movimento?',cb:`function(){delMov('${cid}','${mid}');closeModal();render();showToast('Eliminato');}`});
}
function appSeg(id){approvaSeg(id);render();showToast('✅ Approvato!');}
function rifSeg(id){rifiutaSeg(id);render();showToast('Rifiutato');}
function inviaSegn(cid,cname){
  const tipo=document.getElementById('seg-tipo').value;
  const imp=document.getElementById('seg-imp').value;
  const note=document.getElementById('seg-desc').value.trim();
  const data=document.getElementById('seg-data').value;
  if(!imp||!note){showToast('Compila importo e descrizione!');return;}
  addSeg(cid,cname,tipo,note,imp,data);
  showToast('✅ Segnalazione inviata!');
  document.getElementById('seg-imp').value='';
  document.getElementById('seg-desc').value='';
}
function copyText(t){navigator.clipboard.writeText(t).then(()=>showToast('📋 Link copiato!')).catch(()=>showToast('Copia manualmente'));}
function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);
}

// ── INIT ──
APP.DB = lsLoad();
initRoute();

window.addEventListener('fbReady', () => {
  render();
  // Listen realtime changes
  if(APP.mode==='admin') {
    window.fbListen(data => {
      APP.DB = data;
      lsSave(data);
      APP.syncOk = true;
      render();
    });
  }
});

// Fallback if firebase takes too long
setTimeout(() => {
  if (!window._fbReady) render();
}, 1000);
</script>
